<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小小东 | 我做过的项目</title>
    <meta
      name="description"
      content="小小东做过的公开项目、插件、网页和开源 Skills。"
    />
    <meta property="og:title" content="小小东 | 我做过的项目" />
    <meta
      property="og:description"
      content="小小东做过的公开项目、插件、网页和开源 Skills。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nevertoday.github.io/xiaoxiaodong/" />
    <meta name="theme-color" content="#f6f2e8" data-theme-color />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Noto+Serif+SC:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.dataset.theme = savedTheme || (prefersDark ? "dark" : "light");
        } catch {
          document.documentElement.dataset.theme = "light";
        }

        if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          document.documentElement.classList.add("motion-ready");
        }
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#projects">跳到项目</a>

    <header class="site-header" data-motion="header">
      <a class="brand" href="#top" aria-label="小小东首页">
        <span class="brand-logo" aria-hidden="true">东</span>
        <span>小小东</span>
      </a>

      <nav class="site-nav" aria-label="主要导航">
        <a href="#projects">项目</a>
        <a href="#community">知识星球</a>
        <a href="#skills">Skills</a>
      </nav>

      <div class="header-tools" aria-label="站点工具">
        <a class="nav-icon-link" href="https://github.com/nevertoday" target="_blank" rel="noopener noreferrer" aria-label="打开 GitHub 主页">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 22v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 19 4.77 5.07 5.07 0 0 0 18.91 1S17.73.65 15 2.48a13.38 13.38 0 0 0-7 0C5.27.65 4.09 1 4.09 1A5.07 5.07 0 0 0 4 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 8 18.13V22" />
            <path d="M8 19c-3 .9-5.5 0-7-2" />
          </svg>
        </a>
        <button class="theme-toggle" type="button" data-theme-toggle aria-pressed="false" aria-label="切换到暗色模式">
          <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3a6 6 0 0 0 9 7 9 9 0 1 1-9-7Z" />
          </svg>
          <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2" />
            <path d="M12 20v2" />
            <path d="m4.93 4.93 1.41 1.41" />
            <path d="m17.66 17.66 1.41 1.41" />
            <path d="M2 12h2" />
            <path d="M20 12h2" />
            <path d="m6.34 17.66-1.41 1.41" />
            <path d="m19.07 4.93-1.41 1.41" />
          </svg>
          <span class="sr-only" data-theme-label>暗色</span>
        </button>
      </div>
    </header>

    <main id="main">
      <section id="top" class="hero">
        <div class="hero-main">
          <p class="eyebrow" data-motion="hero-kicker">小小东</p>
          <h1 data-motion="hero-title">程序员。俗人。</h1>
          <p class="hero-note" data-motion="hero-note">养花草，游泳，看美色，整提示词。</p>
        </div>

        <div class="hero-links" data-motion="hero-links" aria-label="小小东主页入口">
          <a href="https://github.com/nevertoday" target="_blank" rel="noopener noreferrer">
            <span>GitHub</span>
          </a>
          <a href="https://x.com/nevertoday" target="_blank" rel="noopener noreferrer">
            <span>X</span>
          </a>
        </div>
      </section>

      <section id="projects" class="projects-section">
        <div class="section-head compact-head" data-motion="section-head">
          <h2>近期可用项目</h2>
          <div class="repo-status" data-repo-status role="status">读取中...</div>
        </div>

        <div class="archive-main">
          <div class="project-grid" data-project-grid aria-live="polite" aria-label="当前可用项目"></div>
        </div>
      </section>

      <section id="community" class="community-section" data-motion="community">
        <div>
          <p class="eyebrow">zhishixingqiu</p>
          <h2>知识星球</h2>
        </div>
        <div class="community-copy">
          <p>日常做项目、复盘、工具分享。</p>
          <a class="community-qr" href="assets/zsxq-qr.svg" target="_blank" rel="noopener noreferrer">
            <img src="assets/zsxq-qr.svg" alt="知识星球二维码" />
            <span>扫码进入</span>
          </a>
        </div>
      </section>

      <section id="skills" class="skills-section">
        <div class="section-head" data-motion="skills-head">
          <div>
            <p class="eyebrow">open skills</p>
            <h2>我开源的 Skills</h2>
          </div>
          <p>给 Agent 用的工作流。</p>
        </div>
        <div class="skills-grid" data-skills-grid aria-label="小小东开源 Skills"></div>
      </section>
    </main>

    <footer class="site-footer">
      <span>小小东做过的项目</span>
      <div>
        <a href="https://github.com/nevertoday/xiaoxiaodong" target="_blank" rel="noopener noreferrer">本站源码</a>
        <a href="https://nevertoday.github.io/xiaoxiaodong/repos.json" target="_blank" rel="noopener noreferrer">项目快照</a>
      </div>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
