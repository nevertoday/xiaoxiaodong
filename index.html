<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小小东 | 我做过的项目</title>
    <meta
      name="description"
      content="小小东做过的公开项目、插件、网页和开源 Skills。"
    />
    <meta property="og:title" content="小小东 | 我做过的项目" />
    <meta
      property="og:description"
      content="小小东做过的公开项目、插件、网页和开源 Skills。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nevertoday.github.io/xiaoxiaodong/" />
    <meta name="theme-color" content="#f6f2e8" data-theme-color />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Noto+Serif+SC:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.dataset.theme = savedTheme || (prefersDark ? "dark" : "light");
        } catch {
          document.documentElement.dataset.theme = "light";
        }

        if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          document.documentElement.classList.add("motion-ready");
        }
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#projects">跳到项目</a>

    <header class="site-header" data-motion="header">
      <a class="brand" href="#top" aria-label="小小东首页">
        <span class="brand-logo" aria-hidden="true">东</span>
        <span>小小东</span>
      </a>

      <nav class="site-nav" aria-label="主要导航">
        <a href="#projects">项目</a>
        <a href="#community">知识星球</a>
        <a href="#skills">Skills</a>
        <a href="#about">关于</a>
      </nav>

      <div class="header-tools" aria-label="站点工具">
        <a class="nav-tool-link" href="https://github.com/nevertoday" target="_blank" rel="noopener noreferrer">GitHub</a>
        <div class="theme-switch" aria-label="切换颜色模式">
          <button type="button" data-theme-option="light">淡色</button>
          <button type="button" data-theme-option="dark">暗色</button>
        </div>
      </div>
    </header>

    <main id="main">
      <section id="top" class="hero">
        <div class="hero-main">
          <p class="eyebrow" data-motion="hero-kicker">小小东 / nevertoday</p>
          <h1 data-motion="hero-title">近期可用项目</h1>
          <div class="hero-actions" data-motion="hero-actions">
            <a class="button button-primary" href="#projects">看项目</a>
            <a class="button button-secondary" href="https://github.com/nevertoday?tab=repositories" target="_blank" rel="noopener noreferrer">GitHub</a>
          </div>
        </div>

        <aside class="hero-console" data-motion="hero-console" aria-label="项目概览">
          <div class="console-head">
            <span>公开项目</span>
            <strong data-project-count>--</strong>
          </div>
          <dl class="console-stats">
            <div>
              <dt>项目</dt>
              <dd data-project-count>--</dd>
            </div>
            <div>
              <dt>类型</dt>
              <dd data-kind-count>--</dd>
            </div>
            <div>
              <dt>最近更新</dt>
              <dd data-latest-date>--</dd>
            </div>
          </dl>
        </aside>
      </section>

      <section id="projects" class="projects-section">
        <div class="section-head" data-motion="section-head">
          <div>
            <p class="eyebrow">projects</p>
            <h2>我做过的项目</h2>
          </div>
          <p>获取是打开项目，源码是 GitHub。</p>
        </div>

        <div class="project-toolbar" data-motion="repo-status">
          <div class="project-tools">
            <label class="search-box">
              <span>搜索</span>
              <input id="repo-search" type="search" placeholder="项目名 / 插件 / 色卡 / Skill" autocomplete="off" />
            </label>
          </div>
          <div class="repo-status" data-repo-status role="status">读取中...</div>
        </div>

        <div class="archive-main">
          <div class="feature-grid" data-feature-grid aria-label="重点项目"></div>
          <div class="repo-grid" data-repo-grid aria-live="polite"></div>
        </div>
      </section>

      <section id="community" class="community-section" data-motion="community">
        <div>
          <p class="eyebrow">zhishixingqiu</p>
          <h2>知识星球</h2>
        </div>
        <div class="community-copy">
          <p>日常做项目、复盘和工具分享。</p>
        </div>
      </section>

      <section id="skills" class="skills-section">
        <div class="section-head" data-motion="skills-head">
          <div>
            <p class="eyebrow">open skills</p>
            <h2>我开源的 Skills</h2>
          </div>
          <p>给 Agent 用的工作流。</p>
        </div>
        <div class="skills-grid" data-skills-grid aria-label="小小东开源 Skills"></div>
      </section>

      <section id="about" class="method-section" data-motion="about">
        <div>
          <p class="eyebrow">about</p>
          <h2>关于小小东</h2>
        </div>
        <div class="method-copy">
          <p>我是小小东。写代码，做插件，做网页。</p>
          <p>这里是我的公开项目列表。</p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>小小东做过的项目</span>
      <div>
        <a href="https://github.com/nevertoday/xiaoxiaodong" target="_blank" rel="noopener noreferrer">本站源码</a>
        <a href="https://nevertoday.github.io/xiaoxiaodong/repos.json" target="_blank" rel="noopener noreferrer">项目快照</a>
      </div>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
